<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Cave Rush</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      touch-action: none;
    }

    /* ── Overlay Screens ───────────────────────────────────── */
    #screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.88);
      font-family: 'Courier New', monospace;
      color: #fff;
      z-index: 10;
      gap: 10px;
      padding: 20px;
    }
    #screen.hidden { display: none; }

    .title {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: bold;
      color: #00ffff;
      text-shadow: 0 0 18px #00ffff, 0 0 40px #00aaff;
      letter-spacing: 5px;
      text-align: center;
    }
    .subtitle {
      font-size: clamp(10px, 3vw, 13px);
      color: #336677;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 16px;
    }
    .score-display {
      font-size: clamp(20px, 6vw, 28px);
      color: #00ffcc;
      font-weight: bold;
      text-align: center;
    }
    .info-text {
      font-size: clamp(11px, 3.2vw, 14px);
      color: #aabbcc;
      text-align: center;
      line-height: 1.8;
      max-width: 300px;
    }
    .info-text span { color: #00ffcc; }

    .btn {
      padding: 14px 44px;
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      font-family: 'Courier New', monospace;
      font-size: clamp(14px, 4vw, 18px);
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      margin: 4px;
      transition: background 0.15s;
    }
    .btn:active, .btn:focus { background: rgba(0,255,255,0.12); outline: none; }
    .btn.secondary { border-color: #224466; color: #4488aa; font-size: 13px; }

    .hi-line {
      font-size: 12px;
      color: #224455;
      letter-spacing: 1px;
      margin-top: 6px;
    }
    .new-hi { color: #ffdd00 !important; text-shadow: 0 0 10px #ffaa00; }

    /* ── HUD ────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 14px 0;
      z-index: 5;
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }
    #hud.hidden { display: none; }
    .hud-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 55px;
    }
    .hud-lbl {
      font-size: 8px;
      color: #224455;
      letter-spacing: 1px;
    }
    .hud-val {
      font-size: clamp(14px, 4.5vw, 18px);
      color: #00ffff;
      font-weight: bold;
      line-height: 1.1;
    }
    .hud-val.warning { color: #ff4444; }
    #lives-row {
      display: flex;
      gap: 4px;
      margin-top: 1px;
    }
    .life-pip {
      width: 10px; height: 10px;
      background: #ff3355;
      clip-path: polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
    }
    .life-pip.empty { background: #221122; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <!-- Main Menu / Game Over / Level Complete all share this panel -->
  <div id="screen">
    <div class="title">CAVE RUSH</div>
    <div class="subtitle">DEEP EARTH EXPLORATION</div>
    <button class="btn" id="btnStart">START</button>
    <button class="btn secondary" id="btnHow">HOW TO PLAY</button>
    <div class="hi-line" id="hiLine"></div>
  </div>

  <!-- HUD (hidden — replaced by canvas dashboard) -->
  <div id="hud" class="hidden"></div>

  <script src="game.js"></script>
</body>
</html>
